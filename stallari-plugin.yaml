name: runpod-blade-mcp
version: "0.3.0"
description: "RunPod GPU compute MCP — pods, serverless endpoints, jobs, templates, billing"
author: Groupthink-dev
license: MIT
tier: certified
author_type: first-party
readiness: beta
homepage: https://github.com/Groupthink-dev/runpod-blade-mcp

# DD-181 Wave 2: virtualmachine-v1 → virtualisation-v1 (DD-157); serverless
# endpoints + jobs declared under serverless-v1. Conformance reset to untested
# pending op-by-op mapping against the new contracts.
contract:
  - virtualisation-v1
  - serverless-v1

services:
  # Canonical virtualisation-v1 axis (added 2026-05-13 for DD-276 B.5a).
  # Maps the contract's Required ops to existing runpod_pod_* tools.
  # RunPod calls VMs "pods" — same concept.
  # host_info not supported — RunPod abstracts the host node.
  # workload_status synthesised by the adapter transform from runpod_pod_get
  # (status field on the pod record) — no dedicated status tool.
  virtualisation:
    workload_list: runpod_pod_list
    workload_get: runpod_pod_get
    workload_status: runpod_pod_get        # status field within the get response

  # Canonical serverless-v1 axis (added 2026-05-13 for DD-276 B.5b).
  # Maps the contract's Required ops to existing runpod_endpoint_* + job + template tools.
  # endpoint_health synthesised by the adapter transform from runpod_endpoint_get
  # (worker state fields on the endpoint record).
  serverless:
    endpoint_list: runpod_endpoint_list
    endpoint_get: runpod_endpoint_get
    endpoint_health: runpod_endpoint_get   # worker/queue fields within the get response
    job_status: runpod_job_status
    template_list: runpod_template_list

  # Vendor-native axes preserved for callers that consume this blade directly
  # outside the *-v1 adapters. Same tools, vendor-native key names.
  vm:
    list: runpod_pod_list
    get: runpod_pod_get
    create: runpod_pod_create
    delete: runpod_pod_delete
    start: runpod_pod_start
    stop: runpod_pod_stop
    reboot: runpod_pod_restart
  gpu:
    types: runpod_gpu_types
  endpoints:
    list: runpod_endpoint_list
    get: runpod_endpoint_get
    create: runpod_endpoint_create
    update: runpod_endpoint_update
    delete: runpod_endpoint_delete
  jobs:
    run: runpod_job_run
    runsync: runpod_job_runsync
    status: runpod_job_status
    cancel: runpod_job_cancel
  billing:
    account: runpod_account_info
    templates: runpod_template_list

setup:
  icon: "🚀"
  blurb: "RunPod GPU compute — provision pods, manage serverless endpoints, run jobs"
  auth_model: api_key
  complexity: simple
  links:
    - label: "Get API Key"
      url: "https://www.runpod.io/console/user/settings"
  fields:
    - key: RUNPOD_API_KEY
      label: "API Key"
      secret: true
      required: true
      placeholder: "Your RunPod API key"
      help: "Create at runpod.io → Settings → API Keys"
    - key: RUNPOD_WRITE_ENABLED
      label: "Enable write operations"
      type: boolean
      required: false
      help: "Create, delete, start, and stop pods and endpoints"

install:
  runtime: node
  package: runpod-blade-mcp
  command: runpod-blade-mcp

env:
  - name: RUNPOD_API_KEY
    secret: true
    required: true
    description: "RunPod API key"
  - name: RUNPOD_WRITE_ENABLED
    secret: false
    required: false
    description: "Set to 'true' to enable write operations (create, delete, start, stop)"

requires:
  stallari: ">=0.73.4"

conformance:
  virtualisation-v1:
    required: untested
    recommended: untested
    optional: untested
    gated: untested
  serverless-v1:
    required: untested
    recommended: untested
    optional: untested
    gated: untested
  last_tested: null
